<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Country Flag</title>
    <style>
        #upper{
            background-color: green;
            width: 900px;
            height: 600px;
            position: relative;
        }
        #middle , #bottom{
            background-color: white;
            width: 100%;
            height: 200px;
            position: absolute;
            top: 200px;
        }
        img{
            width: 100px;
            height: 100px;
            margin: 50px 0px 0px 400px ;
        }
        #bottom{
            background-color: red;
        }
    </style>
</head>
<body>
    <div id="upper">
        <div id="middle">
            <img src="./assests/images/image.png" />
            <div id="bottom"></div>
        </div>
    </div>
</body>
</html>
